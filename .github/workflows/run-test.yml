name: Run test

on:
  # pull_request:
  #   types: [opened, reopened, edited, synchronize]
  #   branches-ignore:
  #     - main
  # push:
  #   branches:
  #     - test
  # schedule:
  #   - cron:  '45 21 * * 5'
  workflow_dispatch:

concurrency:
  group: my-cfapps-portal-run-test

defaults:
  run:
    working-directory: .

permissions:
  contents: 'read'
  id-token: 'write'

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GRPC_VERBOSITY: ERROR  # GRPCのログ出力を抑止

    steps:
    - uses: actions/checkout@v5
      with:
        submodules: 'true'

    - name: Set up PHP 8.2
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.2"
        extensions: grpc

    - name: Validate composer.json and composer.lock
      run: composer validate

    - name: Get current directory
      id: current_dir
      run: echo "CURRENT_DIR=$(pwd)" >> $GITHUB_OUTPUT

    - name: Cache Composer packages
      id: composer-cache
      uses: actions/cache@v4
      with:
        path: ${{ steps.current_dir.outputs.CURRENT_DIR }}/vendor
        key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-php-

    # - name: Cache NPM packages
    #   id: npm-cache
    #   uses: actions/cache@v4
    #   with:
    #     path: ${{ steps.current_dir.outputs.CURRENT_DIR }}/node_modules
    #     key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
    #     restore-keys: |
    #       ${{ runner.os }}-npm-

    - name: Install dependencies (Composer)
      run: composer install --prefer-dist --no-progress
    
    # - name: Install dependencies (NPM)
    #   run: npm install --prefer-offline --no-audit --progress=false

    - name: Google Cloud認証
      id: 'auth'
      uses: 'google-github-actions/auth@v3'
      with:
        workload_identity_provider: 'projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider'
        service_account: 'cloud-run-functions-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com'

    - name: Test with phpunit
      run: bash tests/run_tests.sh
